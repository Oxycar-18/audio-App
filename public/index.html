<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTB Audio Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── palette ───────────────────────────────────────────
       bg:      #0a0a0f  (near-black, slight blue tint)
       surface: #13131a
       border:  #1e1e2a
       accent:  #5b8dee  (soft periwinkle blue)
       accent2: #3ecfb2  (muted teal — used for active states)
       text:    #d4d4e0
       muted:   #6b6b80
    ─────────────────────────────────────────────────────── */

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      background: #0a0a0f;
      color: #d4d4e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #13131a;
      border: 1px solid #1e1e2a;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #e8e8f0;
      margin-bottom: 0.3rem;
    }

    p.subtitle {
      font-size: 0.82rem;
      font-weight: 300;
      color: #6b6b80;
      margin-bottom: 2rem;
      letter-spacing: 0.01em;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b6b80;
      margin-bottom: 0.45rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.72rem 1rem;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 10px;
      color: #d4d4e0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: #3a3a50; }

    input[type="text"]:focus {
      border-color: #5b8dee;
      box-shadow: 0 0 0 3px rgba(91,141,238,0.12);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    .input-row input { flex: 1; }

    .paste-btn {
      margin-top: 0;
      width: auto;
      padding: 0 0.85rem;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      color: #6b6b80;
      transition: border-color 0.2s, color 0.2s;
    }

    .paste-btn:hover { border-color: #5b8dee; color: #5b8dee; background: #0a0a0f; }

    /* main download button */
    button#downloadBtn {
      margin-top: 1.4rem;
      width: 100%;
      padding: 0.82rem;
      background: #5b8dee;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    button#downloadBtn:hover:not(:disabled) {
      background: #4a7de0;
      box-shadow: 0 4px 16px rgba(91,141,238,0.25);
    }

    button#downloadBtn:disabled { background: #1e1e2a; color: #3a3a50; cursor: not-allowed; }

    /* format toggle */
    .format-toggle {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.45rem;
    }

    .fmt-btn {
      margin-top: 0;
      flex: 1;
      padding: 0.52rem;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 10px;
      color: #6b6b80;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .fmt-btn:hover { border-color: #3ecfb2; color: #3ecfb2; }
    .fmt-btn.active { background: rgba(62,207,178,0.1); border-color: #3ecfb2; color: #3ecfb2; }

    /* preview */
    .preview {
      margin-top: 1.3rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e1e2a;
      background: #0a0a0f;
    }

    .preview.hidden { display: none; }

    .preview img {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .preview-info { padding: 0.6rem 0.85rem; }

    .preview-title {
      font-size: 0.82rem;
      font-weight: 400;
      color: #9090a8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    /* status */
    #status {
      margin-top: 1rem;
      font-size: 0.82rem;
      font-weight: 400;
      min-height: 1.2rem;
      text-align: center;
      letter-spacing: 0.01em;
    }

    .status-loading { color: #8899cc; }
    .status-error   { color: #e07070; }
    .status-success { color: #3ecfb2; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Audio Downloader</h1>
    <p class="subtitle">Paste a YouTube link and download the audio.</p>

    <label for="urlInput">YouTube URL</label>
    <div class="input-row">
      <input
        type="text"
        id="urlInput"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off"
        oninput="onUrlInput(this.value)"
      />
      <button type="button" class="paste-btn" onclick="pasteFromClipboard()" title="Paste from clipboard">📋</button>
    </div>

    <div id="preview" class="preview hidden">
      <img id="previewThumb" src="" alt="Video thumbnail" />
      <div class="preview-info">
        <span id="previewTitle" class="preview-title"></span>
      </div>
    </div>

    <label style="margin-top: 1rem;">Format</label>
    <div class="format-toggle">
      <button type="button" class="fmt-btn active" data-fmt="mp3" onclick="selectFormat(this)">MP3</button>
      <button type="button" class="fmt-btn" data-fmt="aac" onclick="selectFormat(this)">AAC</button>
    </div>

    <button id="downloadBtn" onclick="startDownload()">Download</button>
    <div id="status"></div>
  </div>

  <script>
    let selectedFormat = 'mp3';
    let debounceTimer = null;

    function extractVideoId(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
        return u.searchParams.get('v');
      } catch { return null; }
    }

    function onUrlInput(value) {
      clearTimeout(debounceTimer);
      const id = extractVideoId(value.trim());
      const preview = document.getElementById('preview');
      const thumb = document.getElementById('previewThumb');
      const titleEl = document.getElementById('previewTitle');

      if (!id) {
        preview.classList.add('hidden');
        return;
      }

      // Show thumbnail immediately — no need to wait
      thumb.onerror = () => { thumb.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`; thumb.onerror = null; };
      thumb.src = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
      titleEl.textContent = '';
      preview.classList.remove('hidden');

      // Debounce the /info call — wait 500ms after user stops typing
      debounceTimer = setTimeout(() => {
        fetch('/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: value.trim() })
        })
          .then(r => r.ok ? r.json() : null)
          .then(data => { if (data?.title) titleEl.textContent = data.title; })
          .catch(() => {});
      }, 500);
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        const input = document.getElementById('urlInput');
        input.value = text;
        onUrlInput(text);
      } catch {
        setStatus('Clipboard access denied — paste manually.', 'error');
      }
    }

    function selectFormat(btn) {
      document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedFormat = btn.dataset.fmt;
    }

    async function startDownload() {
      const url = document.getElementById('urlInput').value.trim();
      const btn = document.getElementById('downloadBtn');

      if (!url) {
        setStatus('Please enter a YouTube URL.', 'error');
        return;
      }

      btn.disabled = true;
      setStatus('Fetching audio, this may take a moment...', 'loading');

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, format: selectedFormat })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Download failed');
        }

        const disposition = res.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="(.+?)"/);
        const filename = match ? match[1] : `audio.${selectedFormat}`;

        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        setStatus('Download started!', 'success');
      } catch (err) {
        setStatus(err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `status-${type}`;
    }

    document.getElementById('urlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startDownload();
    });
  </script>
</body>
</html>
