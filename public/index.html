<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #d4d4e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #e8e8f0;
      margin-bottom: 0.25rem;
    }

    .page-header p {
      font-size: 0.8rem;
      font-weight: 300;
      color: #6b6b80;
    }

    /* ── shell ── */
    .shell {
      width: 100%;
      max-width: 540px;
      background: #13131a;
      border: 1px solid #1e1e2a;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    /* ── tab bar wrapper ── */
    .tab-bar-wrap {
      display: flex;
      align-items: stretch;
      background: #0e0e16;
      border-bottom: 1px solid #1e1e2a;
    }

    /* scrollable tabs area */
    .tab-bar {
      display: flex;
      align-items: stretch;
      flex: 1;
      overflow-x: auto;
      scrollbar-width: none;
      min-width: 0;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab {
      /* shrink freely down to 80px, then the bar scrolls */
      flex: 1 1 0;
      min-width: 80px;
      max-width: 180px;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0 0.7rem;
      height: 44px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #6b6b80;
      cursor: pointer;
      border-right: 1px solid #1e1e2a;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      overflow: hidden;
      user-select: none;
      position: relative;
    }

    .tab:hover { color: #a0a0b8; }

    .tab.active {
      color: #d4d4e0;
      border-bottom-color: #5b8dee;
      background: #13131a;
    }

    /* status dot on tab */
    .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: transparent;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .tab.downloading .tab-dot { background: #5b8dee; }
    .tab.done        .tab-dot { background: #3ecfb2; }
    .tab.errored     .tab-dot { background: #e07070; }

    .tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .tab-close {
      font-size: 0.7rem;
      color: #3a3a50;
      flex-shrink: 0;
      padding: 0.1rem 0.2rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .tab-close:hover { color: #e07070; background: rgba(224,112,112,0.1); }

    /* hide close button and label when tabs are very narrow */
    .tab.compact .tab-close { display: none; }
    .tab.compact .tab-label { display: none; }

    /* add tab button */
    .tab-add {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 44px;
      font-size: 1.1rem;
      color: #3a3a50;
      cursor: pointer;
      transition: color 0.15s;
      border-left: 1px solid #1e1e2a;
      margin-left: auto;
    }

    .tab-add:hover { color: #5b8dee; }

    /* ── panel ── */
    .panel {
      padding: 1.8rem 2rem 1.6rem;
      display: none;
    }

    .panel.active { display: block; }

    /* input row */
    .input-row {
      display: flex;
      gap: 0.45rem;
      margin-bottom: 0;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.68rem 0.95rem;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 10px;
      color: #d4d4e0;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: #3a3a50; }

    input[type="text"]:focus {
      border-color: #5b8dee;
      box-shadow: 0 0 0 3px rgba(91,141,238,0.1);
    }

    .paste-btn {
      padding: 0 0.8rem;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      color: #6b6b80;
      transition: border-color 0.2s, color 0.2s;
    }

    .paste-btn:hover { border-color: #5b8dee; color: #5b8dee; background: #0a0a0f; }

    /* preview */
    .preview {
      margin-top: 1rem;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #1e1e2a;
      background: #0a0a0f;
      display: none;
    }

    .preview.visible { display: block; }

    .preview img {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .preview-info { padding: 0.5rem 0.85rem; }

    .preview-title {
      font-size: 0.8rem;
      color: #9090a8;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* footer */
    .panel-footer {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      align-items: center;
    }

    .format-toggle { display: flex; gap: 0.35rem; }

    .fmt-btn {
      padding: 0.45rem 0.8rem;
      background: #0a0a0f;
      border: 1px solid #1e1e2a;
      border-radius: 8px;
      color: #6b6b80;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .fmt-btn:hover  { border-color: #3ecfb2; color: #3ecfb2; }
    .fmt-btn.active { background: rgba(62,207,178,0.1); border-color: #3ecfb2; color: #3ecfb2; }

    .dl-btn {
      flex: 1;
      padding: 0.52rem 1rem;
      background: #5b8dee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .dl-btn:hover:not(:disabled) {
      background: #4a7de0;
      box-shadow: 0 4px 14px rgba(91,141,238,0.25);
    }

    .dl-btn:disabled { background: #1e1e2a; color: #3a3a50; cursor: not-allowed; }
    .dl-btn.done     { background: rgba(62,207,178,0.12); color: #3ecfb2; border: 1px solid #3ecfb244; }
    .dl-btn.errored  { background: rgba(224,112,112,0.1);  color: #e07070; border: 1px solid #e0707044; }

    .panel-status {
      margin-top: 0.6rem;
      font-size: 0.76rem;
      min-height: 1rem;
      letter-spacing: 0.01em;
    }

    .panel-status.loading { color: #8899cc; }
    .panel-status.success { color: #3ecfb2; }
    .panel-status.error   { color: #e07070; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Audio Downloader</h1>
    <p>Download YouTube audio in parallel — MP3 or AAC</p>
  </div>

  <div class="shell">
    <div class="tab-bar-wrap">
      <div class="tab-bar" id="tab-bar"></div>
      <div class="tab-add" onclick="addTab()" title="New download">+</div>
    </div>
    <div id="panels"></div>
  </div>

  <script>
    let tabCount = 0;
    let activeTab = null;

    function extractVideoId(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
        return u.searchParams.get('v');
      } catch { return null; }
    }

    // Compact threshold: below this pixel width, hide label & close button
    const COMPACT_THRESHOLD = 52;

    function updateTabSizes() {
      const bar    = document.getElementById('tab-bar');
      const tabs   = [...bar.querySelectorAll('.tab[data-id]')];
      const addBtn = document.querySelector('.tab-add');
      const available = bar.clientWidth; // add btn is now outside the scroll area
      const perTab = tabs.length ? available / tabs.length : available;
      tabs.forEach(t => t.classList.toggle('compact', perTab < COMPACT_THRESHOLD));
    }

    function addTab() {
      const id = ++tabCount;

      // Create tab
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.id = `tab-${id}`;
      tab.dataset.id = id;
      tab.innerHTML = `
        <span class="tab-dot"></span>
        <span class="tab-label">Download ${id}</span>
        <span class="tab-close" onclick="closeTab(event, ${id})">✕</span>
      `;
      tab.addEventListener('click', () => switchTab(id));

      // Insert before the "+" button
      // Insert into the scrollable tab bar
      document.getElementById('tab-bar').appendChild(tab);

      // Create panel
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.id = `panel-${id}`;
      panel.dataset.format = 'mp3';
      panel.dataset.debounce = '';
      panel.innerHTML = `
        <div class="input-row">
          <input type="text" id="url-${id}"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            oninput="onUrlInput(${id}, this.value)" />
          <button class="paste-btn" onclick="pasteUrl(${id})" title="Paste">📋</button>
        </div>

        <div class="preview" id="preview-${id}">
          <img id="thumb-${id}" src="" alt="" />
          <div class="preview-info">
            <span class="preview-title" id="title-${id}"></span>
          </div>
        </div>

        <div class="panel-footer">
          <div class="format-toggle">
            <button class="fmt-btn active" data-fmt="mp3" onclick="selectFormat(${id}, this)">MP3</button>
            <button class="fmt-btn"        data-fmt="aac" onclick="selectFormat(${id}, this)">AAC</button>
          </div>
          <button class="dl-btn" id="dl-${id}" onclick="startDownload(${id})">Download</button>
        </div>

        <div class="panel-status" id="status-${id}"></div>
      `;

      document.getElementById('panels').appendChild(panel);
      switchTab(id);
      updateTabSizes();
      // Scroll new tab into view
      document.getElementById(`tab-${id}`)?.scrollIntoView({ inline: 'end', behavior: 'smooth' });
      document.getElementById(`url-${id}`).focus();
    }

    function switchTab(id) {
      // Deactivate all
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

      document.getElementById(`tab-${id}`)?.classList.add('active');
      document.getElementById(`panel-${id}`)?.classList.add('active');
      activeTab = id;

      // Scroll tab into view
      document.getElementById(`tab-${id}`)?.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
    }

    function closeTab(e, id) {
      e.stopPropagation();

      const allTabs = [...document.querySelectorAll('.tab[data-id]')];
      if (allTabs.length === 1) return; // keep at least one

      document.getElementById(`tab-${id}`)?.remove();
      document.getElementById(`panel-${id}`)?.remove();

      // Switch to nearest remaining tab
      if (activeTab === id) {
        const remaining = [...document.querySelectorAll('.tab[data-id]')];
        if (remaining.length) switchTab(Number(remaining[remaining.length - 1].dataset.id));
      }
      updateTabSizes();
    }

    function onUrlInput(id, value) {
      const panel = document.getElementById(`panel-${id}`);
      clearTimeout(Number(panel.dataset.debounce));

      const videoId = extractVideoId(value.trim());
      const preview = document.getElementById(`preview-${id}`);
      const thumb   = document.getElementById(`thumb-${id}`);
      const titleEl = document.getElementById(`title-${id}`);
      const tab     = document.getElementById(`tab-${id}`);

      if (!videoId) {
        preview.classList.remove('visible');
        tab.querySelector('.tab-label').textContent = `Download ${id}`;
        return;
      }

      thumb.onerror = () => { thumb.src = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`; thumb.onerror = null; };
      thumb.src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
      titleEl.textContent = '';
      preview.classList.add('visible');

      const timer = setTimeout(() => {
        fetch('/info', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: value.trim() })
        })
          .then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data?.title) {
              titleEl.textContent = data.title;
              // Shorten title for tab label
              const short = data.title.length > 22 ? data.title.slice(0, 20) + '…' : data.title;
              tab.querySelector('.tab-label').textContent = short;
            }
          })
          .catch(() => {});
      }, 500);

      panel.dataset.debounce = timer;
    }

    async function pasteUrl(id) {
      try {
        const text = await navigator.clipboard.readText();
        const input = document.getElementById(`url-${id}`);
        input.value = text;
        onUrlInput(id, text);
      } catch {
        setStatus(id, 'Clipboard access denied — paste manually.', 'error');
      }
    }

    function selectFormat(id, btn) {
      const panel = document.getElementById(`panel-${id}`);
      panel.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      panel.dataset.format = btn.dataset.fmt;
    }

    async function startDownload(id) {
      const url    = document.getElementById(`url-${id}`).value.trim();
      const dlBtn  = document.getElementById(`dl-${id}`);
      const panel  = document.getElementById(`panel-${id}`);
      const tab    = document.getElementById(`tab-${id}`);
      const format = panel.dataset.format;

      if (!url) { setStatus(id, 'Please enter a YouTube URL.', 'error'); return; }

      dlBtn.disabled = true;
      dlBtn.textContent = 'Downloading…';
      dlBtn.className = 'dl-btn';
      tab.className = 'tab downloading' + (activeTab === id ? ' active' : '');
      setStatus(id, 'Fetching audio, this may take a moment…', 'loading');

      try {
        const res = await fetch('/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, format })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Download failed');
        }

        const disposition = res.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="(.+?)"/);
        const filename = match ? match[1] : `audio.${format}`;

        const blob = await res.blob();
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);

        dlBtn.disabled = false;
        dlBtn.textContent = '✓ Done';
        dlBtn.className = 'dl-btn done';
        tab.className = 'tab done' + (activeTab === id ? ' active' : '');
        setStatus(id, `Saved as ${filename}`, 'success');
      } catch (err) {
        dlBtn.disabled = false;
        dlBtn.textContent = 'Retry';
        dlBtn.className = 'dl-btn errored';
        tab.className = 'tab errored' + (activeTab === id ? ' active' : '');
        setStatus(id, err.message, 'error');
      }
    }

    function setStatus(id, msg, type) {
      const el = document.getElementById(`status-${id}`);
      el.textContent = msg;
      el.className = `panel-status ${type}`;
    }

    // Start with one tab
    addTab();

    // Recompute on window resize
    new ResizeObserver(updateTabSizes).observe(document.querySelector('.tab-bar-wrap'));
  </script>
</body>
</html>
