<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="7" fill="#13131a"/>

  <!-- music note -->
  <g fill="#5b8dee">
    <!-- note stem + flag -->
    <rect x="18" y="6" width="2.5" height="13" rx="1.2"/>
    <path d="M18 6 Q24 4 24 8 Q24 11 18 10 Z"/>
    <!-- note head -->
    <ellipse cx="15" cy="20" rx="4" ry="3" transform="rotate(-15 15 20)"/>
  </g>

  <!-- download arrow (bottom-right, teal) -->
  <g fill="#3ecfb2">
    <!-- arrow shaft -->
    <rect x="21" y="20" width="2.5" height="5.5" rx="1.2"/>
    <!-- arrow head -->
    <polygon points="17.5,24.5 22.25,29.5 27,24.5"/>
  </g>
</svg>
